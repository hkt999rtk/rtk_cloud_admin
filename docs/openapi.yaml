        device_id:
          type: string
        device_name:
          type: string
        current_version:
          type: string
        target_version:
          type: string
        rollout_status:
          type: string
        failure_reason:
          type: string
        last_updated:
          type: string
          format: date-time
    FirmwareDistributionCampaign:
      type: object
      required: [campaign_id, target_version, policy, state, applied, pending, failed, skipped, total, started_at]
      properties:
        campaign_id:
          type: string
        target_version:
          type: string
        policy:
          type: string
        state:
          type: string
        applied:
          type: integer
        pending:
          type: integer
        failed:
          type: integer
        skipped:
          type: integer
        total:
          type: integer
        started_at:
          type: string
          format: date-time
        rollouts:
          type: array
          items:
            $ref: "#/components/schemas/FirmwareDistributionRollout"
    FirmwareDistribution:
      type: object
      required: [org_id, source_status, versions, campaigns]
      properties:
        org_id:
          type: string
        source_status:
          type: string
        source_message:
          type: string
        versions:
          type: array
          items:
            $ref: "#/components/schemas/FirmwareDistributionVersion"
        campaigns:
          type: array
          items:
            $ref: "#/components/schemas/FirmwareDistributionCampaign"
    QuotaRaiseRequest:
      type: object
      required: [requested_quota, use_case, contact_info]
      properties:
        requested_quota:
          type: integer
          minimum: 1
