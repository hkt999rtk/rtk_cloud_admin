openapi: 3.0.3
info:
  title: RTK Cloud Admin BFF API
  version: 0.1.0
  license:
    name: Proprietary
  description: |
    HTTP API exposed by `rtk_cloud_admin` for the Admin Console web UI.

    This service is a BFF. Account Manager remains authoritative for identity,
    organizations, membership, brand-cloud records, registry devices, quota
    requests, and SSO provider configuration. Video Cloud remains authoritative
    for activation, telemetry, firmware, and streaming facts. Admin Console
    stores local sessions, audit metadata, and demo
    projections.

    All JSON endpoints may return `text/plain` error responses from Go
    `http.Error` for validation, authorization, and upstream failures.
servers:
  - url: /
    description: Same-origin Admin Console server
tags:
  - name: Health
    description: Process and upstream health checks.
  - name: Auth
    description: Login, logout, signup, verification, and SSO session creation.
  - name: Session
    description: Current user and active organization state.
  - name: Customer
    description: Customer-scoped organization and account workflows.
  - name: Platform Admin
    description: Platform-admin protected operations.
  - name: Devices
    description: Device inventory, detail, telemetry, and lifecycle actions.
  - name: Fleet
    description: Customer fleet health, stream, firmware, and telemetry projections.
  - name: Operations
    description: Provisioning and deactivation lifecycle operations.
  - name: Audit
    description: Audit event views.
  - name: Brand Clouds
    description: Account Manager-backed brand-cloud administration.
  - name: Developer
    description: Global developer session and active Brand Cloud management.
  - name: ChipSet SDK
    description: Account Manager-backed ChipSet and SDK provider administration and developer resources.
  - name: SSO
    description: Account Manager-backed OIDC SSO configuration and flows.
security:
  - SessionCookie: []
paths:
  /healthz:
    get:
      tags: [Health]
      summary: Process health check
      security: []
      responses:
        "200":
          description: Process is alive.
          content:
            text/plain:
              schema:
                type: string
                example: "ok\n"

  /api/auth/customer/signup:
    post:
      tags: [Auth]
      summary: Start customer self-service signup
      description: Proxies signup to Account Manager. Requires `ACCOUNT_MANAGER_BASE_URL`.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "202":
          description: Signup accepted; Account Manager created a pending user and organization.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignupResult"
        "400":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"
        "503":
          $ref: "#/components/responses/PlainTextError"

  /api/auth/customer/login:
    post:
      tags: [Auth]
      summary: Customer password login
      description: Enabled by default; set `CUSTOMER_PASSWORD_LOGIN_ENABLED=false` to disable.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded and set `rtk_admin_session`.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HTTP-only `rtk_admin_session` cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "400":
          $ref: "#/components/responses/PlainTextError"
        "401":
          $ref: "#/components/responses/PlainTextError"
        "403":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"
        "503":
          $ref: "#/components/responses/PlainTextError"

  /api/auth/customer/verify-email:
    post:
      tags: [Auth]
      summary: Verify a customer signup email token
      description: Proxies token verification to Account Manager and creates a customer session when tokens are returned.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthTokenRequest"
      responses:
        "200":
          description: Verification succeeded.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HTTP-only `rtk_admin_session` cookie when Account Manager returns tokens.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyEmailResult"
        "400":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"
        "503":
          $ref: "#/components/responses/PlainTextError"

  /api/auth/customer/resend-verification:
    post:
      tags: [Auth]
      summary: Resend customer email verification
      description: Proxies resend request to Account Manager.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "202":
          description: Resend accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusAccepted"
        "400":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"
        "503":
          $ref: "#/components/responses/PlainTextError"

  /api/auth/sign-in:
    post:
      tags: [Auth]
      summary: Request an email sign-in activation token
      description: Proxies to Account Manager and always returns `202 Accepted` for syntactically valid email requests, including unknown, disabled, and rate-limited accounts. Token delivery is handled by Account Manager's configured server-side sink.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "202":
          description: Sign-in request accepted when applicable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusAccepted"
        "400":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"
        "503":
          $ref: "#/components/responses/PlainTextError"

  /api/auth/login/activate:
    post:
      tags: [Auth]
      summary: Activate an email sign-in token
      description: Proxies login activation to Account Manager and sets `rtk_admin_session` only after the one-time token succeeds.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthTokenRequest"
      responses:
        "200":
          description: Login activation succeeded and set `rtk_admin_session`.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HTTP-only `rtk_admin_session` cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSessionResult"
        "400":
          $ref: "#/components/responses/PlainTextError"
        "401":
          $ref: "#/components/responses/PlainTextError"
        "403":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"
        "503":
          $ref: "#/components/responses/PlainTextError"

  /api/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request an email password-reset activation token
      description: Proxies to Account Manager and always returns `202 Accepted` for syntactically valid email requests, including unknown, disabled, and rate-limited accounts.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailRequest"
      responses:
        "202":
          description: Password reset request accepted when applicable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusAccepted"
        "400":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"
        "503":
          $ref: "#/components/responses/PlainTextError"

  /api/auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset a password with an email activation token
      description: Proxies reset token consumption to Account Manager. Account Manager revokes existing refresh tokens after a successful password reset.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "204":
          description: Password reset succeeded.
        "400":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"
        "503":
          $ref: "#/components/responses/PlainTextError"

  /api/auth/sso/start:
    post:
      tags: [SSO, Auth]
      summary: Start Account Manager-backed SSO
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SSOStartRequest"
      responses:
        "200":
          description: SSO provider was resolved and a redirect URL was returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SSOStartResult"
        "400":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"
        "503":
          $ref: "#/components/responses/PlainTextError"

  /api/auth/sso/callback:
    get:
      tags: [SSO, Auth]
      summary: Complete Account Manager-backed SSO
      description: Exchanges `code` and `state`, creates a local session, then redirects to `/console` or `/admin`.
      security: []
      parameters:
        - $ref: "#/components/parameters/Code"
        - $ref: "#/components/parameters/State"
        - name: redirect_uri
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        "302":
          description: Session created; browser redirected to the console.
          headers:
            Location:
              schema:
                type: string
                enum: [/console, /admin]
            Set-Cookie:
              schema:
                type: string
              description: HTTP-only `rtk_admin_session` cookie.
        "400":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"
        "503":
          $ref: "#/components/responses/PlainTextError"

  /api/auth/platform/login:
    post:
      tags: [Auth, Platform Admin]
      summary: Account Manager platform-admin password login
      description: Authenticates Account Manager platform-admin credentials during the migration period. Local Cloud Admin break-glass login is not supported.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded and set `rtk_admin_session`.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: HTTP-only `rtk_admin_session` cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"
        "400":
          $ref: "#/components/responses/PlainTextError"
        "401":
          $ref: "#/components/responses/PlainTextError"
        "403":
          $ref: "#/components/responses/PlainTextError"

  /api/auth/logout:
    post:
      tags: [Auth, Session]
      summary: Delete the local Admin Console session
      responses:
        "200":
          description: Session row was deleted if present and cookie was cleared.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Expired `rtk_admin_session` cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusOK"

  /api/me:
    get:
      tags: [Session]
      summary: Current user, memberships, active organization, and auth settings
      description: Returns demo identity when no session exists.
      security:
        - SessionCookie: []
        - {}
      responses:
        "200":
          description: Current identity and console capabilities.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "502":
          $ref: "#/components/responses/PlainTextError"

  /api/me/active-org:
    post:
      tags: [Session, Customer]
      summary: Switch active customer organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActiveOrgRequest"
      responses:
        "200":
          description: Active organization was updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActiveOrgResponse"
        "400":
          $ref: "#/components/responses/PlainTextError"
        "401":
          $ref: "#/components/responses/PlainTextError"
        "403":
          $ref: "#/components/responses/PlainTextError"

  /api/developer/brand-clouds:
    get:
      tags: [Developer]
      summary: List Brand Clouds available to the signed-in developer
      responses:
        "200":
          description: Developer Brand Cloud memberships.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeveloperBrandCloudList"
        "401": { $ref: "#/components/responses/PlainTextError" }

  /api/developer/brand-clouds/{brandCloudID}:
    get:
      tags: [Developer]
      summary: Get one Brand Cloud and the current membership
      parameters:
        - { name: brandCloudID, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Brand Cloud detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeveloperBrandCloudDetail"
        "401": { $ref: "#/components/responses/PlainTextError" }
        "403": { $ref: "#/components/responses/PlainTextError" }

  /api/developer/brand-clouds/{brandCloudID}/members:
    get:
      tags: [Developer]
      summary: List Brand Cloud developer members
      parameters:
        - { name: brandCloudID, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: Member list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeveloperMemberList"
        "401": { $ref: "#/components/responses/PlainTextError" }
        "403": { $ref: "#/components/responses/PlainTextError" }

  /api/developer/brand-clouds/{brandCloudID}/members/{userID}:
    patch:
      tags: [Developer]
      summary: Update a Brand Cloud member role
      parameters:
        - { name: brandCloudID, in: path, required: true, schema: { type: string } }
        - { name: userID, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { type: string, enum: [owner, admin, member] }
      responses:
        "200": { description: Member updated. }
        "401": { $ref: "#/components/responses/PlainTextError" }
        "403": { $ref: "#/components/responses/PlainTextError" }
    delete:
      tags: [Developer]
      summary: Remove a Brand Cloud member
      parameters:
        - { name: brandCloudID, in: path, required: true, schema: { type: string } }
        - { name: userID, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "204": { description: Member removed. }
        "401": { $ref: "#/components/responses/PlainTextError" }
        "403": { $ref: "#/components/responses/PlainTextError" }
        "502":
          $ref: "#/components/responses/PlainTextError"
  /api/developer/brand-clouds/{brandCloudID}/members/{userID}/{action}:
    patch:
      tags: [Developer]
      summary: Enable or disable a Brand Cloud member
      parameters:
        - { name: brandCloudID, in: path, required: true, schema: { type: string } }
        - { name: userID, in: path, required: true, schema: { type: string } }
        - { name: action, in: path, required: true, schema: { type: string, enum: [enable, disable] } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: Member status updated }
        "409": { description: Last owner cannot be disabled }

  /api/developer/brand-clouds/{brandCloudID}/members/invitations:
    post:
      tags: [Developer]
      summary: Invite an existing developer account to a Brand Cloud
      parameters:
        - { name: brandCloudID, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, role]
              properties:
                email: { type: string, format: email }
                role: { type: string, enum: [owner, admin, member] }
      responses:
        "202": { description: Invitation accepted }
        "401": { $ref: "#/components/responses/PlainTextError" }
        "403": { $ref: "#/components/responses/PlainTextError" }

  /api/developer/brand-clouds/{brandCloudID}/owner-transfer:
    post:
      tags: [Developer]
      summary: Request an owner transfer to an existing developer
      parameters:
        - { name: brandCloudID, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [target_email]
              properties:
                target_email: { type: string, format: email }
      responses:
        "202": { description: Owner transfer requested }
        "403": { description: Current member cannot transfer ownership }

  /api/developer/brand-cloud-owner-transfers/accept:
    post:
      tags: [Developer]
      summary: Accept an owner transfer invitation
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        "200": { description: Owner transfer accepted }
        "401": { $ref: "#/components/responses/PlainTextError" }
        "409": { $ref: "#/components/responses/PlainTextError" }

  /api/developer/brand-clouds/{brandCloudID}/owner-transfer/{transferID}:
    get:
      tags: [Developer]
      summary: Get owner transfer status
      parameters:
        - { name: brandCloudID, in: path, required: true, schema: { type: string } }
        - { name: transferID, in: path, required: true, schema: { type: string } }
      responses:
        "200": { description: Owner transfer status }
        "404": { description: Transfer not found }

  /api/developer/brand-clouds/{brandCloudID}/owner-transfer/{transferID}/cancel:
    post:
      tags: [Developer]
      summary: Cancel a pending owner transfer
      parameters:
        - { name: brandCloudID, in: path, required: true, schema: { type: string } }
        - { name: transferID, in: path, required: true, schema: { type: string } }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: Owner transfer canceled }
        "404": { description: Transfer not found }

  /api/summary:
    get:
      tags: [Customer]
      summary: Dashboard summary
      description: Returns a customer-scoped summary when a customer session exists; otherwise local/demo summary.
      security:
        - SessionCookie: []
        - {}
      responses:
        "200":
          description: Fleet summary.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Summary"
                  - $ref: "#/components/schemas/CustomerSummary"
        "403":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"

  /api/developer/chipsets:
    get:
      tags: [ChipSet SDK]
      summary: List published normalized ChipSet and SDK resources
      responses:
        "200":
          description: Published resources; provider URLs and raw manifests are never exposed.
          content:
            application/json:
              schema:
                type: object
                required: [chipsets, source_status]
                properties:
                  chipsets: { type: array, items: { $ref: "#/components/schemas/DeveloperChipset" } }
                  source_status: { type: string, enum: [available] }
        "401": { $ref: "#/components/responses/PlainTextError" }
        "502": { $ref: "#/components/responses/PlainTextError" }

  /api/developer/chipsets/{chipsetId}:
    get:
      tags: [ChipSet SDK]
      summary: Get a published normalized ChipSet and its SDK releases
      parameters:
        - $ref: "#/components/parameters/ChipsetID"
      responses:
        "200":
          description: Published resource detail.
          content:
            application/json:
              schema:
                type: object
                required: [chipset, source_status]
                properties:
                  chipset: { $ref: "#/components/schemas/DeveloperChipset" }
                  source_status: { type: string, enum: [available] }
        "401": { $ref: "#/components/responses/PlainTextError" }
        "404": { $ref: "#/components/responses/PlainTextError" }

  /api/admin/chipset-providers:
    get:
      tags: [ChipSet SDK]
      summary: List Information Providers
      description: Requires `platform.chipset_sdk.read`.
      responses:
        "200": { description: Provider list }
        "403": { $ref: "#/components/responses/PlainTextError" }
    post:
      tags: [ChipSet SDK]
      summary: Create a draft Information Provider
      description: Requires `platform.chipset_sdk.edit`.
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: "#/components/schemas/ChipsetProviderRequest" } }
      responses:
        "201": { description: Draft provider created }
        "400": { $ref: "#/components/responses/PlainTextError" }
        "403": { $ref: "#/components/responses/PlainTextError" }

  /api/admin/chipset-providers/{providerId}:
    get:
      tags: [ChipSet SDK]
      summary: Preview provider metadata and its last normalized snapshot
      description: Requires `platform.chipset_sdk.read`.
      parameters:
        - $ref: "#/components/parameters/ProviderID"
      responses:
        "200": { description: Provider and normalized ChipSet preview }
        "403": { $ref: "#/components/responses/PlainTextError" }
        "404": { $ref: "#/components/responses/PlainTextError" }
    patch:
      tags: [ChipSet SDK]
      summary: Update provider name or manifest URL
      description: Requires `platform.chipset_sdk.edit`.
      parameters:
        - $ref: "#/components/parameters/ProviderID"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json: { schema: { $ref: "#/components/schemas/ChipsetProviderRequest" } }
      responses:
        "200": { description: Provider updated }
        "400": { $ref: "#/components/responses/PlainTextError" }
        "403": { $ref: "#/components/responses/PlainTextError" }

  /api/admin/chipset-providers/{providerId}/{action}:
    post:
      tags: [ChipSet SDK]
      summary: Publish, unpublish, or refresh a provider
      description: Requires `platform.chipset_sdk.publish`.
      parameters:
        - $ref: "#/components/parameters/ProviderID"
        - name: action
          in: path
          required: true
          schema: { type: string, enum: [publish, unpublish, refresh] }
        - $ref: "#/components/parameters/IdempotencyKey"
      responses:
        "200": { description: Provider action completed }
        "400": { $ref: "#/components/responses/PlainTextError" }
        "403": { $ref: "#/components/responses/PlainTextError" }
        "409": { $ref: "#/components/responses/PlainTextError" }

  /api/admin/summary:
    get:
      tags: [Platform Admin]
      summary: Platform-wide dashboard summary
      responses:
        "200":
          description: Platform-wide summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Summary"
        "401":
          $ref: "#/components/responses/PlainTextError"
        "403":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"

  /api/admin/platform-dashboard:
    get:
      tags: [Platform Admin]
      summary: Platform Dashboard BFF payload
      description: |
        Platform-admin protected dashboard boundary. The BFF composes existing
        admin read-model summary data, KPI strip, operation-risk data, grouped
        scrape health, and server-side allowlisted Prometheus queries for
        runtime, cross-service, business, infrastructure, and network panels.
        Browser clients never receive a raw Prometheus passthrough.
      responses:
        "200":
          description: Platform Dashboard payload with per-source states.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformDashboard"
        "401":
          $ref: "#/components/responses/PlainTextError"
        "403":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"

  /api/admin/platform-resource-trends:
    get:
      tags: [Platform Admin]
      summary: Deprecated platform server resource trend payload
      deprecated: true
      description: |
        Deprecated compatibility route for older Resource Trends clients. The
        Admin WebUI no longer links to or calls this endpoint; long-term
        metrics, resource trends, and deep observability belong in Grafana.
        Browser clients receive only normalized server ids, labels, roles,
        values, and source states; raw Prometheus labels, instance addresses,
        and IP addresses are not exposed.
      parameters:
        - in: query
          name: range
          schema:
            type: string
            enum: [24h, 7d, 90d]
            default: 24h
      responses:
        "200":
          description: Sanitized Platform resource trend payload.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformResourceTrends"
        "401":
          $ref: "#/components/responses/PlainTextError"
        "403":
          $ref: "#/components/responses/PlainTextError"

