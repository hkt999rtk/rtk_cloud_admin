      tags: [Platform Admin, Brand Clouds]
      summary: Get a brand-cloud organization
      parameters:
        - $ref: "#/components/parameters/BrandCloudID"
      responses:
        "200":
          description: Brand cloud organization.
          content:
            application/json:
              schema:
                type: object
                required: [brand_cloud]
