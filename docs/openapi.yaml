            $ref: "#/components/schemas/FleetStreamTrendPoint"
    FleetStreamStats:
      type: object
      required:
        - org_id
        - window
        - source_status
        - success_rate_pct
        - avg_duration_seconds
        - active_sessions
        - never_streamed_count
        - by_mode
        - trend
        - trend_by_mode
        - worst_devices
      properties:
        org_id:
          type: string
        window:
          type: string
        source_status:
          type: string
        source_message:
          type: string
        success_rate_pct:
          type: number
        avg_duration_seconds:
          type: number
        active_sessions:
          type: integer
        never_streamed_count:
          type: integer
        by_mode:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/FleetStreamStatsMode"
        trend:
          type: array
          items:
            $ref: "#/components/schemas/FleetStreamTrendPoint"
        trend_by_mode:
          type: array
          items:
            $ref: "#/components/schemas/FleetStreamModeTrend"
        worst_devices:
          type: array
          items:
            $ref: "#/components/schemas/FleetStreamWorstDevice"
    FirmwareDistributionVersion:
