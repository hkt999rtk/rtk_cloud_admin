        date:
          type: string
        online_pct:
          type: number
          format: double
    TelemetryEvent:
      type: object
      required: [occurred_at, event_type, summary]
      properties:
        occurred_at:
          type: string
          format: date-time
        event_type:
          type: string
        summary:
          type: string
    DeviceTelemetry:
      type: object
