        "502":
          $ref: "#/components/responses/PlainTextError"
        "503":
          $ref: "#/components/responses/PlainTextError"

components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: rtk_admin_session

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Stable client key used to safely replay a write request.
      schema:
        type: string
        minLength: 1
    DeviceID:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: dev-001
    OrgID:
      name: orgId
      in: path
      required: true
      schema:
        type: string
      example: org-acme
    BrandCloudID:
      name: brandCloudId
      in: path
      required: true
      schema:
        type: string
      example: brand-1
    FleetWindow:
      name: window
      in: query
      required: false
      schema:
        type: string
        enum: [7d, 30d, 90d]
        default: 7d
    Code:
      name: code
      in: query
      required: true
      schema:
        type: string
    State:
      name: state
      in: query
      required: true
      schema:
        type: string
    ProviderID:
      name: providerId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ChipsetID:
      name: chipsetId
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    PlainTextError:
      description: Plain text error response.
      content:
        text/plain:
          schema:
            type: string
            example: authentication required

  schemas:
    StatusOK:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
    StatusAccepted:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted]
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          format: password
          minLength: 8
    SignupRequest:
      type: object
      required: [email, password, organization_name]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        display_name:
          type: string
        organization_name:
          type: string
        captcha_token:
          type: string
    SignupResult:
      type: object
      required: [user, organization]
      properties:
        user:
          $ref: "#/components/schemas/User"
        organization:
          $ref: "#/components/schemas/Organization"
    AuthTokenRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
    VerifyEmailResult:
      type: object
      required: [user]
      properties:
        user:
          $ref: "#/components/schemas/User"
        tokens:
          $ref: "#/components/schemas/Tokens"
    AuthSessionResult:
      type: object
      required: [status, kind]
      properties:
        status:
          type: string
          enum: [ok]
        kind:
          type: string
          enum: [customer, platform_admin]
    EmailRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
    SSOStartRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email
        return_url:
          type: string
          format: uri-reference
    SSOStartResult:
      type: object
      required: [redirect_url]
      properties:
        redirect_url:
          type: string
          format: uri
        state:
          type: string
        provider_id:
          type: string
        organization_id:
          type: string
        organization:
          type: string
    ActiveOrgRequest:
      type: object
      required: [organization_id]
      properties:
        organization_id:
          type: string
    ActiveOrgResponse:
      type: object
      required: [active_org_id]
      properties:
        active_org_id:
          type: string
    User:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
    Tokens:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer
        expires_at:
          type: string
          format: date-time
    Organization:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          type: string
        organization_kind:
          type: string
        status:
          type: string
        tier:
          type: string
        evaluation_device_quota:
          type: integer
        capabilities:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
    Membership:
      type: object
      required: [organization_id, organization, role]
      properties:
        organization_id:
          type: string
        organization:
          type: string
        role:
          type: string
        tier:
          type: string
        evaluation_device_quota:
          type: integer
        capabilities:
          type: array
          items:
            type: string
    Me:
      type: object
      required:
        - user_id
        - email
        - name
        - kind
        - memberships
        - active_org_id
        - demo_mode
        - authenticated
        - customer_password_login_enabled
      properties:
        user_id:
          type: string
        email:
          type: string
        name:
          type: string
        kind:
          type: string
          enum: [demo, customer, platform_admin]
        memberships:
          type: array
          items:
            $ref: "#/components/schemas/Membership"
        active_org_id:
          type: string
        demo_mode:
          type: boolean
        authenticated:
          type: boolean
        capabilities:
          type: array
          items:
            type: string
        customer_password_login_enabled:
          type: boolean
    Summary:
      type: object
      required:
        - total_devices
        - online_devices
        - activated_devices
        - pending_devices
        - failed_devices
        - open_operations
        - customers
      properties:
        total_devices:
          type: integer
        online_devices:
          type: integer
        activated_devices:
          type: integer
        pending_devices:
          type: integer
        failed_devices:
          type: integer
        open_operations:
          type: integer
        customers:
          type: integer
    CustomerSummary:
      type: object
      required:
        - organization_id
        - organization
        - total_devices
        - online_devices
        - activated_devices
        - pending_devices
        - failed_devices
        - last_seen_at
      properties:
        organization_id:
          type: string
        organization:
          type: string
        total_devices:
          type: integer
        online_devices:
          type: integer
        activated_devices:
          type: integer
        pending_devices:
          type: integer
        failed_devices:
          type: integer
        last_seen_at:
          type: string
          format: date-time
    ReadinessState:
      type: string
      enum:
        - registered
        - claim_pending
        - local_onboarding_pending
        - cloud_activation_pending
        - activated
        - online
        - failed
        - deactivation_pending
        - deactivated
    OperationState:
      type: string
      enum:
        - pending
        - published
        - succeeded
        - failed
        - retrying
        - dead_lettered
    SourceFact:
      type: object
      required: [layer, state, detail, retryable]
      properties:
        layer:
          type: string
        state:
          type: string
        detail:
          type: string
        retryable:
          type: boolean
        error_code:
          type: string
        operation_id:
          type: string
        updated_at:
          type: string
          format: date-time
    CustomerSourceFact:
      type: object
      required: [layer, state, detail, retryable]
      properties:
        layer:
          type: string
        state:
          type: string
        detail:
          type: string
        retryable:
          type: boolean
        error_code:
          type: string
        updated_at:
          type: string
          format: date-time
    Device:
      type: object
      required:
        - id
        - organization_id
        - organization
        - name
        - category
        - model
        - serial_number
        - video_cloud_devid
        - firmware_version
        - status
        - readiness
        - source_facts
        - last_seen_at
        - updated_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        sku_id:
          type: string
          format: uuid
          description: Canonical SKU/device profile identifier.
        organization:
          type: string
        name:
          type: string
        category:
          type: string
        model:
          type: string
        serial_number:
          type: string
        video_cloud_devid:
          type: string
        firmware_version:
          type: string
        health:
          type: string
        signal_quality:
          type: string
        status:
          type: string
        readiness:
          $ref: "#/components/schemas/ReadinessState"
        source_facts:
          type: array
          items:
            $ref: "#/components/schemas/SourceFact"
        last_seen_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CustomerDevice:
      type: object
      description: Customer-safe device DTO; does not include `video_cloud_devid`.
      required:
        - id
        - organization_id
        - organization
        - name
        - category
        - model
        - serial_number
        - firmware_version
        - status
        - readiness
        - source_facts
        - last_seen_at
        - updated_at
      properties:
        id:
          type: string
        organization_id:
          type: string
        sku_id:
          type: string
          format: uuid
          description: Canonical SKU/device profile identifier.
        organization:
          type: string
        name:
          type: string
        category:
          type: string
        model:
          type: string
        serial_number:
          type: string
        firmware_version:
          type: string
        health:
          type: string
        signal_quality:
          type: string
        status:
          type: string
        readiness:
          $ref: "#/components/schemas/ReadinessState"
        source_facts:
          type: array
          items:
            $ref: "#/components/schemas/CustomerSourceFact"
        last_seen_at:
          type: string
          format: date-time
        updated_at:
          type: string

    SKU:
      type: object
      required: [id, name, status, service_capabilities, allowed_actions]
      properties:
        id:
          type: string
        name:
          type: string
        product_model:
          type: string
        category:
          type: string
        status:
          type: string
        service_capabilities:
          type: array
          items:
            type: string
        device_policy:
          type: object
          additionalProperties: true
        firmware_policy:
          type: object
          additionalProperties: true
        allowed_actions:
          type: array
          items:
            type: string
        updated_at:
          type: string
