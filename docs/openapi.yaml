  /api/admin/brand-clouds:
    get:
      tags: [Platform Admin, Brand Clouds]
      summary: List brand-cloud organizations
      description: Requires Account Manager-backed platform-admin session. Results are filtered and paginated by the Cloud Admin BFF.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
            minimum: 1
            maximum: 100
          description: Maximum number of rows to return.
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Zero-based row offset.
        - in: query
          name: q
          schema:
            type: string
          description: Search brand name, organization id, owner/admin email, or tenant metadata.
        - in: query
          name: status
          schema:
            type: string
            enum: [active, setup_required, disabled, error]
          description: Filter by normalized brand-cloud status.
        - in: query
          name: tier
          schema:
            type: string
          description: Filter by commercial/evaluation tier.
      responses:
        "200":
          description: Brand-cloud organizations.
          content:
            application/json:
              schema:
                type: object
                required: [brand_clouds, pagination]
                properties:
                  brand_clouds:
                    type: array
                    items:
                      $ref: "#/components/schemas/Organization"
                  pagination:
                    type: object
                    required: [limit, offset, total]
                    properties:
                      limit:
                        type: integer
                      offset:
                        type: integer
                      total:
                        type: integer
        "401":
          $ref: "#/components/responses/PlainTextError"
        "403":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"
        "503":
          $ref: "#/components/responses/PlainTextError"
    post:
      tags: [Platform Admin, Brand Clouds]
      summary: Create a brand-cloud organization
      description: Requires Account Manager-backed platform-admin session.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrandCloudRequest"
      responses:
        "201":
          description: Brand cloud created.
          content:
            application/json:
              schema:
                type: object
                required: [brand_cloud]
                properties:
                  brand_cloud:
                    $ref: "#/components/schemas/Organization"
        "400":
          $ref: "#/components/responses/PlainTextError"
        "401":
          $ref: "#/components/responses/PlainTextError"
        "403":
          $ref: "#/components/responses/PlainTextError"
        "502":
          $ref: "#/components/responses/PlainTextError"
        "503":
          $ref: "#/components/responses/PlainTextError"

  /api/admin/brand-clouds/{brandCloudId}:
