        - device_id
        - health
        - signals
        - firmware_version
        - telemetry_status
        - active_stream_status
        - rssi_7d
        - uptime_7d
        - recent_events
      properties:
        device_id:
          type: string
        device_name:
          type: string
        organization:
          type: string
        serial_number:
          type: string
        model:
          type: string
        last_seen_at:
          type: string
          format: date-time
        health:
          type: string
        signals:
          type: array
          items:
            type: string
        firmware_version:
          type: string
        telemetry_status:
          type: string
        active_stream_status:
          type: string
        unavailable_reason:
          type: string
        rssi_7d:
          type: array
          items:
            $ref: "#/components/schemas/TelemetryRssiSample"
        uptime_7d:
          type: array
          items:
            $ref: "#/components/schemas/TelemetryUptimeSample"
        recent_events:
          type: array
          items:
            $ref: "#/components/schemas/TelemetryEvent"
    FleetHealthCurrent:
      type: object
      required: [healthy, warning, critical, unknown]
      properties:
        healthy:
          type: integer
        warning:
          type: integer
        critical:
          type: integer
        unknown:
          type: integer
    FleetHealthTrendPoint:
      type: object
      required: [date, online_pct, warning_count, critical_count]
      properties:
        date:
          type: string
        online_pct:
          type: number
        warning_count:
          type: integer
        critical_count:
          type: integer
    FleetHealthSummary:
      type: object
      required: [org_id, source_status, current, online_rate_7d_pct, trend]
      properties:
        org_id:
          type: string
        source_status:
          type: string
        source_message:
          type: string
        current:
          $ref: "#/components/schemas/FleetHealthCurrent"
        online_rate_7d_pct:
          type: number
        trend:
          type: array
          items:
            $ref: "#/components/schemas/FleetHealthTrendPoint"
    FleetStreamStatsMode:
      type: object
      required: [requests, success_rate_pct]
      properties:
        requests:
          type: integer
        success_rate_pct:
          type: number
    FleetStreamTrendPoint:
      type: object
      required: [date, requests, success_rate_pct]
      properties:
        date:
          type: string
        requests:
          type: integer
        success_rate_pct:
          type: number
    FleetStreamWorstDevice:
      type: object
