        device_id:
          type: string
        device_name:
          type: string
        mode_used:
          type: string
        readiness:
          type: string
        success_rate_pct:
          type: number
        requests:
          type: integer
        last_stream_at:
          type: string
          format: date-time
    FleetStreamModeTrend:
      type: object
