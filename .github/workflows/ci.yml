name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize contracts submodule when token is available
        env:
          CONTRACTS_REPO_TOKEN: ${{ secrets.CONTRACTS_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$CONTRACTS_REPO_TOKEN" ]; then
            echo "::warning::CONTRACTS_REPO_TOKEN is not configured; skipping private contracts submodule checkout"
            exit 0
          fi
          git config --global \
            url."https://x-access-token:${CONTRACTS_REPO_TOKEN}@github.com/hkt999rtk/rtk_cloud_contracts_doc.git".insteadOf \
            "https://github.com/hkt999rtk/rtk_cloud_contracts_doc.git"
          git config --global --add \
            url."https://x-access-token:${CONTRACTS_REPO_TOKEN}@github.com/hkt999rtk/rtk_cloud_contracts_doc.git".insteadOf \
            "git@github.com-work:hkt999rtk/rtk_cloud_contracts_doc.git"
          git submodule update --init --depth=1 docs/rtk_cloud_contracts_doc

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Prepare CI artifacts
        run: mkdir -p .artifacts/logs .artifacts/report-candidates/docs

      - name: Go tests with coverage
        run: |
          set -euo pipefail
          go test ./... -coverprofile=coverage.out 2>&1 | tee .artifacts/logs/go-test.log
          echo PASS > .artifacts/logs/go-test.status

      - name: Go build
        run: |
          set -euo pipefail
          go build -o .artifacts/rtk-cloud-admin ./cmd/server 2>&1 | tee .artifacts/logs/go-build.log
          echo PASS > .artifacts/logs/go-build.status

      - name: Go coverage gate
        run: |
          set -euo pipefail
          go tool cover -func=coverage.out 2>&1 | tee .artifacts/logs/go-coverage-gate.log
          total="$(go tool cover -func=coverage.out | awk '/^total:/ { gsub("%", "", $3); print $3 }')"
          awk -v total="$total" -v min="80.0" 'BEGIN {
            if (total < min) {
              printf("Go total coverage %.1f%% is below %.1f%%\n", total, min)
              exit 1
            }
            printf("Go total coverage %.1f%% meets %.1f%% baseline\n", total, min)
          }' | tee -a .artifacts/logs/go-coverage-gate.log
          echo PASS > .artifacts/logs/go-coverage-gate.status

      - name: Frontend install
        working-directory: web
        run: |
          set -euo pipefail
          npm ci 2>&1 | tee ../.artifacts/logs/frontend-install.log
          echo PASS > ../.artifacts/logs/frontend-install.status

      - name: Frontend tests
        working-directory: web
        run: |
          set -euo pipefail
          npm test 2>&1 | tee ../.artifacts/logs/frontend-test.log
          echo PASS > ../.artifacts/logs/frontend-test.status

      - name: Frontend build
        working-directory: web
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee ../.artifacts/logs/frontend-build.log
          echo PASS > ../.artifacts/logs/frontend-build.status

      - name: Native server smoke
        run: |
          set -euo pipefail
          exec > >(tee .artifacts/logs/native-smoke.log) 2>&1

          smoke_dir="$(mktemp -d)"
          server_pid=""
          cleanup() {
            if [ -n "$server_pid" ]; then
              kill "$server_pid" >/dev/null 2>&1 || true
              wait "$server_pid" >/dev/null 2>&1 || true
            fi
            rm -rf "$smoke_dir"
          }
          trap cleanup EXIT

          PORT=18080 \
            DATABASE_PATH="$smoke_dir/ci.db" \
            ADMIN_BOOTSTRAP_EMAIL=admin@example.com \
            ADMIN_BOOTSTRAP_PASSWORD=secret \
            ADMIN_BREAK_GLASS_ENABLED=true \
            .artifacts/rtk-cloud-admin > "$smoke_dir/server.log" 2>&1 &
          server_pid="$!"

          ready=0
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/healthz | grep -qx 'ok'; then
              ready=1
              break
            fi
            if ! kill -0 "$server_pid" >/dev/null 2>&1; then
              cat "$smoke_dir/server.log" >&2 || true
              exit 1
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            cat "$smoke_dir/server.log" >&2 || true
            echo "timeout: service did not become ready within 30s" >&2
            exit 1
          fi

          curl -fsS http://127.0.0.1:18080/healthz | grep -qx 'ok'
          curl -fsS http://127.0.0.1:18080/api/service-health | grep -q '"status":"demo"'

          printf '%s' '{"email":"admin@example.com","password":"secret"}' > "$smoke_dir/login.json"
          curl -fsS -D "$smoke_dir/login.headers" -o "$smoke_dir/login.body" \
            -H 'Content-Type: application/json' \
            --data-binary @"$smoke_dir/login.json" \
            http://127.0.0.1:18080/api/auth/platform/login
          session_id="$(sed -n 's/.*rtk_admin_session=\([^;[:space:]]*\).*/\1/p' "$smoke_dir/login.headers" | head -n1)"
          if [ -z "$session_id" ]; then
            echo "platform login did not return an rtk_admin_session cookie" >&2
            cat "$smoke_dir/login.body" >&2 || true
            cat "$smoke_dir/login.headers" >&2 || true
            exit 1
          fi
          grep -q '"status":"ok"' "$smoke_dir/login.body"
          curl -fsS --cookie "rtk_admin_session=${session_id}" http://127.0.0.1:18080/api/me | grep -q '"kind":"platform_admin"'

          curl -fsS http://127.0.0.1:18080/api/summary | grep -q '"total_devices"'
          curl -fsS http://127.0.0.1:18080/console | grep -q 'id="root"'
          echo PASS > .artifacts/logs/native-smoke.status

      - name: Generate test report candidate
        if: always()
        run: |
          set -euo pipefail
          scripts/generate_test_report.sh coverage.out .artifacts/logs .artifacts/report-candidates/docs/TEST_REPORT.md
          scripts/validate_test_report.sh .artifacts/report-candidates/docs/TEST_REPORT.md

      - name: Check tracked test report drift
        run: |
          set -euo pipefail
          cmp -s docs/TEST_REPORT.md .artifacts/report-candidates/docs/TEST_REPORT.md || {
            echo "docs/TEST_REPORT.md is stale. Import the test-report-candidate artifact or update the tracked report." >&2
            diff -u docs/TEST_REPORT.md .artifacts/report-candidates/docs/TEST_REPORT.md >&2 || true
            exit 1
          }
