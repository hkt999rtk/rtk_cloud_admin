name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: [self-hosted, linux, x64, rtk-cloud-admin-ci]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Prepare CI artifacts
        run: mkdir -p .artifacts/logs .artifacts/report-candidates/docs

      - name: Go tests with coverage
        run: |
          set -euo pipefail
          go test ./... -coverprofile=coverage.out 2>&1 | tee .artifacts/logs/go-test.log
          echo PASS > .artifacts/logs/go-test.status

      - name: Go build
        run: |
          set -euo pipefail
          go build ./cmd/server 2>&1 | tee .artifacts/logs/go-build.log
          echo PASS > .artifacts/logs/go-build.status

      - name: Go coverage gate
        run: |
          set -euo pipefail
          go tool cover -func=coverage.out 2>&1 | tee .artifacts/logs/go-coverage-gate.log
          total="$(go tool cover -func=coverage.out | awk '/^total:/ { gsub("%", "", $3); print $3 }')"
          awk -v total="$total" -v min="80.0" 'BEGIN {
            if (total < min) {
              printf("Go total coverage %.1f%% is below %.1f%%\n", total, min)
              exit 1
            }
            printf("Go total coverage %.1f%% meets %.1f%% baseline\n", total, min)
          }' | tee -a .artifacts/logs/go-coverage-gate.log
          echo PASS > .artifacts/logs/go-coverage-gate.status

      - name: Frontend install
        working-directory: web
        run: |
          set -euo pipefail
          npm ci 2>&1 | tee ../.artifacts/logs/frontend-install.log
          echo PASS > ../.artifacts/logs/frontend-install.status

      - name: Frontend tests
        working-directory: web
        run: |
          set -euo pipefail
          npm test 2>&1 | tee ../.artifacts/logs/frontend-test.log
          echo PASS > ../.artifacts/logs/frontend-test.status

      - name: Frontend build
        working-directory: web
        run: |
          set -euo pipefail
          npm run build 2>&1 | tee ../.artifacts/logs/frontend-build.log
          echo PASS > ../.artifacts/logs/frontend-build.status

      - name: Docker build
        id: docker_build
        run: |
          image_tag="rtk-cloud-admin:${GITHUB_SHA}"
          docker build -t "${image_tag}" -t rtk-cloud-admin:ci . 2>&1 | tee .artifacts/logs/docker-build.log
          echo "ci_image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo PASS > .artifacts/logs/docker-build.status

      - name: Container smoke
        run: |
          set -euo pipefail
          exec > >(tee .artifacts/logs/container-smoke.log) 2>&1

          ci_image_tag="${{ steps.docker_build.outputs.ci_image_tag }}"
          if [ -z "${ci_image_tag}" ]; then
            ci_image_tag="rtk-cloud-admin:ci"
          fi
          container_name="rtk-cloud-admin-ci-smoke-${GITHUB_RUN_ID}"
          smoke_dir="$(mktemp -d)"
          chmod 0777 "$smoke_dir"
          container_id=""
          cleanup() {
            if [ -n "$container_id" ]; then
              docker rm -f "$container_id" >/dev/null 2>&1 || true
            fi
            docker rm -f "$container_name" >/dev/null 2>&1 || true
            rm -rf "$smoke_dir"
          }
          trap cleanup EXIT

          container_id="$(docker run -d \
            --name "$container_name" \
            -e PORT=8080 \
            -e DATABASE_PATH=/data/ci.db \
            -e ADMIN_BOOTSTRAP_EMAIL=admin@example.com \
            -e ADMIN_BOOTSTRAP_PASSWORD=secret \
            -e ADMIN_BREAK_GLASS_ENABLED=true \
            -v "$smoke_dir:/data" \
            "$ci_image_tag")"

          ready=0
          for _ in $(seq 1 30); do
            if docker exec "$container_id" wget -qO- http://127.0.0.1:8080/healthz | grep -qx 'ok'; then
              ready=1
              break
            fi
            if ! docker inspect -f '{{.State.Running}}' "$container_id" >/dev/null 2>&1; then
              docker logs "$container_id" >&2 || true
              exit 1
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            docker logs "$container_id" >&2 || true
            echo "timeout: service did not become ready within 30s" >&2
            exit 1
          fi

          docker exec "$container_id" wget -qO- http://127.0.0.1:8080/healthz | grep -qx 'ok'
          docker exec "$container_id" wget -qO- http://127.0.0.1:8080/api/service-health | grep -q '"status":"demo"'

          printf '%s' '{"email":"admin@example.com","password":"secret"}' > "$smoke_dir/login.json"
          docker exec "$container_id" sh -lc 'wget -S -O - --post-file=/data/login.json http://127.0.0.1:8080/api/auth/platform/login' > "$smoke_dir/login.body" 2> "$smoke_dir/login.headers"
          session_id="$(sed -n 's/.*rtk_admin_session=\([^;[:space:]]*\).*/\1/p' "$smoke_dir/login.headers" | head -n1)"
          if [ -z "$session_id" ]; then
            echo "platform login did not return an rtk_admin_session cookie" >&2
            cat "$smoke_dir/login.body" >&2 || true
            cat "$smoke_dir/login.headers" >&2 || true
            exit 1
          fi
          grep -q '"status":"ok"' "$smoke_dir/login.body"
          docker exec "$container_id" sh -lc "wget -qO- --header='Cookie: rtk_admin_session=${session_id}' http://127.0.0.1:8080/api/me" | grep -q '"kind":"platform_admin"'

          docker exec "$container_id" wget -qO- http://127.0.0.1:8080/api/summary | grep -q '"total_devices"'
          docker exec "$container_id" wget -qO- http://127.0.0.1:8080/console | grep -q 'id="root"'
          echo PASS > .artifacts/logs/container-smoke.status

      - name: Generate test report candidate
        if: always()
        run: |
          set -euo pipefail
          scripts/generate_test_report.sh coverage.out .artifacts/logs .artifacts/report-candidates/docs/TEST_REPORT.md
          scripts/validate_test_report.sh .artifacts/report-candidates/docs/TEST_REPORT.md

      - name: Upload test report candidate
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-candidate
          path: .artifacts/report-candidates/

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: |
            .artifacts/logs/
            coverage.out

      - name: Check tracked test report drift
        run: |
          set -euo pipefail
          cmp -s docs/TEST_REPORT.md .artifacts/report-candidates/docs/TEST_REPORT.md || {
            echo "docs/TEST_REPORT.md is stale. Import the test-report-candidate artifact or update the tracked report." >&2
            diff -u docs/TEST_REPORT.md .artifacts/report-candidates/docs/TEST_REPORT.md >&2 || true
            exit 1
          }

      - name: Docker cleanup
        if: always()
        run: |
          docker image rm rtk-cloud-admin:ci "${{ steps.docker_build.outputs.ci_image_tag }}" >/dev/null 2>&1 || true
          docker image prune -af >/dev/null 2>&1 || true
          docker builder prune -af >/dev/null 2>&1 || true
