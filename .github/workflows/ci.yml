name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: [self-hosted, linux, x64, rtk-cloud-admin-ci]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Go tests
        run: go test ./...

      - name: Go build
        run: go build ./cmd/server

      - name: Frontend install
        working-directory: web
        run: npm ci

      - name: Frontend build
        working-directory: web
        run: npm run build

      - name: Docker build
        run: docker build -t rtk-cloud-admin:ci .

      - name: Container smoke
        run: |
          set -euo pipefail
          smoke_dir="$(mktemp -d)"
          container_id=""
          cleanup() {
            if [ -n "$container_id" ]; then
              docker rm -f "$container_id" >/dev/null 2>&1 || true
            fi
            rm -rf "$smoke_dir"
          }
          trap cleanup EXIT

          container_id="$(docker run -d \
            --name rtk-cloud-admin-ci-smoke \
            -p 127.0.0.1:18080:8080 \
            -e PORT=8080 \
            -e DATABASE_PATH=/data/ci.db \
            -v "$smoke_dir:/data" \
            rtk-cloud-admin:ci)"

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/healthz | grep -qx 'ok'; then
              break
            fi
            if ! docker inspect -f '{{.State.Running}}' "$container_id" >/dev/null 2>&1; then
              docker logs "$container_id" >&2 || true
              exit 1
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:18080/healthz | grep -qx 'ok'
          curl -fsS http://127.0.0.1:18080/api/summary | grep -q '"total_devices"'
          curl -fsS http://127.0.0.1:18080/console | grep -q 'id="root"'

      - name: Docker cleanup
        if: always()
        run: |
          docker image rm rtk-cloud-admin:ci >/dev/null 2>&1 || true
          docker builder prune -af >/dev/null 2>&1 || true
