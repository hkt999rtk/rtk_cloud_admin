name: Release Bundle

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Defaults to the git ref name or timestamped short SHA."
        required: false
        type: string

permissions:
  contents: write

jobs:
  package:
    name: Package release
    runs-on: [self-hosted, linux, x64, rtk-cloud-admin-ci]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Select version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            version="$INPUT_VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="ci-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::12}"
          fi
          case "$version" in
            *[!A-Za-z0-9._-]* | "" | .* | *..*)
              echo "invalid version: use only letters, digits, dot, underscore, and dash" >&2
              exit 1
              ;;
          esac
          artifact_name="rtk_cloud_admin-$version"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'artifact_name=%s\n' "$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Build release bundle
        run: VERSION="${{ steps.version.outputs.version }}" ./deploy/package.sh

      - name: Verify release bundle
        run: ./deploy/check-release.sh "dist/rtk_cloud_admin-${{ steps.version.outputs.version }}"

      - name: Upload release bundle to Linode Object Storage
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJ_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJ_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-sea
          AWS_EC2_METADATA_DISABLED: "true"
          LINODE_OBJ_BUCKET: ${{ vars.LINODE_OBJ_BUCKET }}
          LINODE_OBJ_ENDPOINT: ${{ vars.LINODE_OBJ_ENDPOINT }}
          VERSION: ${{ steps.version.outputs.version }}
          ARTIFACT_NAME: ${{ steps.version.outputs.artifact_name }}
        run: |
          set -euo pipefail
          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user awscli
            export PATH="$HOME/.local/bin:$PATH"
          fi
          test -n "$AWS_ACCESS_KEY_ID"
          test -n "$AWS_SECRET_ACCESS_KEY"
          test -n "$LINODE_OBJ_BUCKET"
          test -n "$LINODE_OBJ_ENDPOINT"
          local_bundle="dist/rtk_cloud_admin-$VERSION.tar.gz"
          object_bundle="dist/$VERSION.tar.gz"
          checksum="$object_bundle.sha256"
          manifest="dist/$VERSION.object-manifest.json"
          artifact_path="releases/$ARTIFACT_NAME/$VERSION.tar.gz"
          cp "$local_bundle" "$object_bundle"
          shasum -a 256 "$object_bundle" | awk '{print $1}' > "$checksum"
          python3 - <<'PY' > "$manifest"
          import json
          import os
          from pathlib import Path
          from datetime import datetime, timezone

          version = os.environ["VERSION"]
          artifact_name = os.environ["ARTIFACT_NAME"]
          bundle = f"{version}.tar.gz"
          checksum = Path(f"dist/{bundle}.sha256").read_text().strip()
          print(json.dumps({
              "version": version,
              "source_commit": os.environ["GITHUB_SHA"],
              "bundle": bundle,
              "artifact_path": f"releases/{artifact_name}/{bundle}",
              "sha256": checksum,
              "created_at": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
          }, indent=2, sort_keys=True))
          PY
          prefix="s3://$LINODE_OBJ_BUCKET/releases/$ARTIFACT_NAME"
          aws s3 cp "$object_bundle" "s3://$LINODE_OBJ_BUCKET/$artifact_path" --endpoint-url "$LINODE_OBJ_ENDPOINT" --only-show-errors
          aws s3 cp "$checksum" "$prefix/$VERSION.tar.gz.sha256" --endpoint-url "$LINODE_OBJ_ENDPOINT" --only-show-errors
          aws s3 cp "$manifest" "$prefix/manifest.json" --endpoint-url "$LINODE_OBJ_ENDPOINT" --only-show-errors

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: |
            dist/rtk_cloud_admin-${{ steps.version.outputs.version }}
            dist/rtk_cloud_admin-${{ steps.version.outputs.version }}.tar.gz
            dist/${{ steps.version.outputs.version }}.tar.gz
            dist/${{ steps.version.outputs.version }}.tar.gz.sha256
            dist/${{ steps.version.outputs.version }}.object-manifest.json
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset="dist/rtk_cloud_admin-${{ steps.version.outputs.version }}.tar.gz"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$asset" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$asset" --generate-notes --title "$GITHUB_REF_NAME"
          fi
