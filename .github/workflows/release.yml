name: Release Bundle

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Defaults to the git ref name or timestamped short SHA."
        required: false
        type: string
      publish_bundle:
        description: "Build and upload the native release bundle. Set false for GHCR image-only publishes."
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

jobs:
  package:
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.publish_bundle)
    name: Package release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Select version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_VERSION:-}" ]; then
            version="$INPUT_VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="ci-$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::12}"
          fi
          case "$version" in
            *[!A-Za-z0-9._-]* | "" | .* | *..*)
              echo "invalid version: use only letters, digits, dot, underscore, and dash" >&2
              exit 1
              ;;
          esac
          artifact_name="rtk_cloud_admin-$version"
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"
          printf 'artifact_name=%s\n' "$artifact_name" >> "$GITHUB_OUTPUT"

      - name: Build release bundle
        run: VERSION="${{ steps.version.outputs.version }}" ./deploy/package.sh

      - name: Verify release bundle
        run: ./deploy/check-release.sh "dist/rtk_cloud_admin-${{ steps.version.outputs.version }}"

      - name: Upload release bundle to Linode Object Storage
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJ_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJ_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-sea
          AWS_EC2_METADATA_DISABLED: "true"
          LINODE_OBJ_BUCKET: ${{ vars.LINODE_OBJ_BUCKET }}
          LINODE_OBJ_ENDPOINT: ${{ vars.LINODE_OBJ_ENDPOINT }}
          VERSION: ${{ steps.version.outputs.version }}
          ARTIFACT_NAME: ${{ steps.version.outputs.artifact_name }}
        run: |
          set -euo pipefail
          test -n "$AWS_ACCESS_KEY_ID"
          test -n "$AWS_SECRET_ACCESS_KEY"
          test -n "$LINODE_OBJ_BUCKET"
          test -n "$LINODE_OBJ_ENDPOINT"
          local_bundle="dist/rtk_cloud_admin-$VERSION.tar.gz"
          object_bundle="dist/$VERSION.tar.gz"
          checksum="$object_bundle.sha256"
          manifest="dist/$VERSION.object-manifest.json"
          artifact_path="releases/$ARTIFACT_NAME/$VERSION.tar.gz"
          cp "$local_bundle" "$object_bundle"
          shasum -a 256 "$object_bundle" | awk '{print $1}' > "$checksum"
          python3 - <<'PY' > "$manifest"
          import json
          import os
          from pathlib import Path
          from datetime import datetime, timezone

          version = os.environ["VERSION"]
          artifact_name = os.environ["ARTIFACT_NAME"]
          bundle = f"{version}.tar.gz"
          checksum = Path(f"dist/{bundle}.sha256").read_text().strip()
          print(json.dumps({
              "version": version,
              "source_commit": os.environ["GITHUB_SHA"],
              "bundle": bundle,
              "artifact_path": f"releases/{artifact_name}/{bundle}",
              "sha256": checksum,
              "created_at": datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
          }, indent=2, sort_keys=True))
          PY
          prefix="releases/$ARTIFACT_NAME"
          go run ./cmd/s3put --file "$object_bundle" --key "$artifact_path"
          go run ./cmd/s3put --file "$checksum" --key "$prefix/$VERSION.tar.gz.sha256"
          go run ./cmd/s3put --file "$manifest" --key "$prefix/manifest.json"

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          assets=(
            "dist/rtk_cloud_admin-$version.tar.gz"
            "dist/$version.tar.gz"
            "dist/$version.tar.gz.sha256"
            "dist/$version.object-manifest.json"
          )
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --generate-notes --title "$GITHUB_REF_NAME"
          fi

  publish-image:
    name: Publish LKE image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Select image tags
        id: image
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY}/cloud-admin"
          short_sha="${GITHUB_SHA::12}"
          tags=("$image:sha-$short_sha")
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tags+=("$image:$GITHUB_REF_NAME")
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            tags+=("$image:$INPUT_VERSION")
          fi
          {
            printf 'image=%s\n' "$image"
            printf 'short_sha=%s\n' "$short_sha"
            printf 'tags<<EOF\n'
            printf '%s\n' "${tags[@]}"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Build smoke image
        shell: bash
        run: |
          set -euo pipefail
          docker build -t "${{ steps.image.outputs.image }}:local-smoke" -f deploy/lke/Dockerfile .
          docker run --rm --entrypoint /bin/sh "${{ steps.image.outputs.image }}:local-smoke" -c \
            'test -x /app/rtk-cloud-admin && test -d /app/web/dist'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/lke/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Write image manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/lke-image
          cat > .artifacts/lke-image/image-manifest.json <<JSON
          {
            "schema": "rtk-service-image/v1",
            "repository": "${GITHUB_REPOSITORY}",
            "image": "${{ steps.image.outputs.image }}",
            "source_commit": "${GITHUB_SHA}",
            "primary_tag": "sha-${{ steps.image.outputs.short_sha }}"
          }
          JSON
          {
            echo "## LKE image"
            echo
            echo "\`\`\`json"
            cat .artifacts/lke-image/image-manifest.json
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload image manifest
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: image-manifest
          path: .artifacts/lke-image/image-manifest.json
          if-no-files-found: error
